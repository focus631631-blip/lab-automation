name: 竞价提醒
on:
  schedule:
    - cron: '27 1 * * 1-5'   # UTC 01:27 = 北京时间 9:27，周一至周五
  workflow_dispatch:

jobs:
  auction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Run auction alert
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          HOLDINGS: ${{ secrets.HOLDINGS }}
        run: python auction_alert_gh.py
