name: 持仓监控
on:
  schedule:
    - cron: '10 7 * * 1-5'   # UTC 07:10 = 北京时间 15:10，周一至周五
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Run stock monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          HOLDINGS: ${{ secrets.HOLDINGS }}
        run: python stock_monitor_gh.py
