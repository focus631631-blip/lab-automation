name: 盘前简报
on:
  schedule:
    - cron: '55 0 * * 1-5'   # UTC 00:55 = 北京时间 8:55，周一至周五
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Run morning briefing
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: python github-actions/morning_briefing_gh.py
