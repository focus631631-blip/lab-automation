name: 文献日报
on:
  schedule:
    - cron: '0 0 * * *'    # 主运行  UTC 00:00 = 北京 8:00
    - cron: '0 4 * * *'    # 备用①  UTC 04:00 = 北京 12:00
    - cron: '0 12 * * *'   # 备用②  UTC 12:00 = 北京 20:00
  workflow_dispatch:       # 允许手动触发
jobs:
  literature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Run literature monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          # 只有 8:00 主运行和手动触发算 primary；12:00/20:00 是 backup（无新文献时静默）
          RUN_ROLE: ${{ (github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * *') && 'primary' || 'backup' }}
        run: python literature_monitor_gh.py
