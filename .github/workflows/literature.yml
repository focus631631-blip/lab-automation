name: 文献日报
on:
  schedule:
    - cron: '0 0 * * *'    # 主运行  UTC 00:00 = 北京 8:00
    - cron: '0 4 * * *'    # 备用①  UTC 04:00 = 北京 12:00
    - cron: '0 12 * * *'   # 备用②  UTC 12:00 = 北京 20:00
  workflow_dispatch:       # 允许手动触发
    inputs:
      preview:
        description: '预览模式：推一张样例卡片演示期刊分区/IF 新格式（不改历史）'
        type: boolean
        default: false
permissions:
  contents: write          # 允许把 pushed_history.json 提交回仓库
jobs:
  literature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Run literature monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          EASYSCHOLAR_KEY: ${{ secrets.EASYSCHOLAR_KEY }}   # 期刊分区/影响因子；缺失则自动跳过徽章
          PREVIEW: ${{ github.event.inputs.preview == 'true' && '1' || '' }}   # 预览模式开关
          # 只有 8:00 主运行和手动触发算 primary；12:00/20:00 是 backup（无新文献时静默）
          RUN_ROLE: ${{ (github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * *') && 'primary' || 'backup' }}
        run: python literature_monitor_gh.py
      - name: Persist push history + archive
        if: success()   # 推送失败时(python exit 1)不提交，历史不前进，下次会重试
        run: |
          if [[ -n "$(git status --porcelain pushed_history.json archive index.html journal_rank_cache.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pushed_history.json archive index.html journal_rank_cache.json
            git commit -m "chore: update history + archive + site [skip ci]"
            git push
          else
            echo "无变化，跳过提交"
          fi
